name: Unpack open-source release

on:
  push:
    branches:
      - main
    paths:
      - open_source_yolo11_ablation.tar.gz

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Unpack source tree
        shell: bash
        run: |
          set -euo pipefail
          archive="open_source_yolo11_ablation.tar.gz"
          if [[ ! -f "$archive" ]]; then
            exit 0
          fi

          tar -xzf "$archive"
          rm -f "$archive" ECFP.zip

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publish YOLO11 ECFP source code"
          git push
